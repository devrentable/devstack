<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>devstack</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-neutral-950 text-white antialiased">
  <main class="flex min-h-screen items-center justify-center px-6">
    <section class="mx-auto w-full max-w-3xl text-center">
      <div class="mb-8 inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm text-neutral-300">
        <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
        Docker environments, simplified
      </div>

      <h1 class="text-5xl font-semibold tracking-tight text-white sm:text-7xl">
        devstack
      </h1>

      <p class="mx-auto mt-6 max-w-xl text-base leading-7 text-neutral-400 sm:text-lg">
        Build clean, ready-to-run Docker development stacks in seconds.
      </p>

      <form class="mx-auto mt-10 grid max-w-xl gap-4 text-left">
        <label class="grid gap-2">
          <span class="text-sm font-medium text-neutral-300">Tecnologia</span>
          <select class="h-12 rounded-md border border-white/10 bg-white/5 px-4 text-sm text-white outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
            <option class="bg-neutral-950">PHP</option>
          </select>
        </label>

        <label class="grid gap-2">
          <span class="text-sm font-medium text-neutral-300">PHP Version</span>
          <select class="h-12 rounded-md border border-white/10 bg-white/5 px-4 text-sm text-white outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
            <option class="bg-neutral-950">8.4</option>
            <option class="bg-neutral-950">8.3</option>
            <option class="bg-neutral-950">8.2</option>
          </select>
        </label>

        <label class="grid gap-2">
          <span class="text-sm font-medium text-neutral-300">Database</span>
          <select class="h-12 rounded-md border border-white/10 bg-white/5 px-4 text-sm text-white outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
            <option class="bg-neutral-950">MySQL</option>
            <option class="bg-neutral-950">PostgreSQL</option>
            <option class="bg-neutral-950">MariaDB</option>
          </select>
        </label>

        <label class="flex items-center justify-between rounded-md border border-white/10 bg-white/5 px-4 py-3">
          <span class="text-sm font-medium text-neutral-300">Redis</span>
          <input type="checkbox" class="h-5 w-5 rounded border-white/20 bg-neutral-950 text-emerald-400 focus:ring-emerald-400">
        </label>

        <label class="flex items-center justify-between rounded-md border border-white/10 bg-white/5 px-4 py-3">
          <span class="text-sm font-medium text-neutral-300">phpMyAdmin</span>
          <input type="checkbox" class="h-5 w-5 rounded border-white/20 bg-neutral-950 text-emerald-400 focus:ring-emerald-400">
        </label>

        <button
          type="submit"
          class="mt-2 inline-flex h-12 items-center justify-center rounded-md bg-white px-6 text-sm font-medium text-neutral-950 transition hover:bg-neutral-200 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-neutral-950"
        >
          Generate Stack
        </button>
      </form>
    </section>
  </main>
</body>
</html>
